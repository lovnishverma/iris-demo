<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Species Prediction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:#fff;
            padding:30px;
            width:420px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#2c3e50;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:12px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

        .result{
            margin-top:20px;
            text-align:center;
            background:#d4edda;
            color:#155724;
            padding:12px;
            border-radius:5px;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Iris Flower Prediction</h1> <br>
    {{ct}}

    <form action="/predict" method="post">

        <label>Sepal Length (cm)</label>
        <input type="number" step="0.01" name="sl" required>

        <label>Sepal Width (cm)</label>
        <input type="number" step="0.01" name="sw" required>

        <label>Petal Length (cm)</label>
        <input type="number" step="0.01" name="pl" required>

        <label>Petal Width (cm)</label>
        <input type="number" step="0.01" name="pw" required>

        <button type="submit">Predict</button>

    </form>

    {% if pred %}
    <div class="result">
        Predicted Species: <br>
        {{ pred }}
    </div>
    {% endif %}


    <br>
<a href="/"> Click here</a> to do another prediction
<br>

<a href="/about"> Click here</a> to know about developer..
</div>




</body>
</html>
