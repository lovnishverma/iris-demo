<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iris Flower Prediction</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">


  <style>
    * {
      box-sizing: border-box;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      background:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
        url("https://cdn-uploads.huggingface.co/production/uploads/6474405f90330355db146c76/NtpyxHsvO5slaLQ09RG_E.gif") center / cover no-repeat fixed;
      color: #f5f6fa;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .card h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
    }

    .card p {
      text-align: center;
      font-size: 0.95rem;
      opacity: 0.85;
      margin-bottom: 1.5rem;
    }

    form {
      display: grid;
      gap: 0.9rem;
    }

    input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    input:focus {
      border-color: #6c5ce7;
      box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.4);
    }

    button {
      margin-top: 0.6rem;
      padding: 0.75rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.5);
    }

    .prediction-box {
      margin-top: 1.2rem;
      padding: 1rem;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      text-align: center;
    }

    .prediction-text {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
      color: #a29bfe;
    }

    .prediction-text span {
      color: #00e5ff;
    }

    .pred-img {
      display: flex;
      justify-content: center;
    }

    .pred-img img {
      width: 100%;
      max-width: 220px;
      height: auto;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      transition: transform 0.2s ease;
    }

    .pred-img img:hover {
      transform: scale(1.03);
    }

    .back-link {
      display: block;
      margin-top: 1.2rem;
      text-align: center;
      text-decoration: none;
      color: #c7d2fe;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 400px) {
      .card {
        padding: 1.5rem 1.2rem;
      }

      .card h1 {
        font-size: 1.4rem;
      }

      .pred-img img {
        max-width: 180px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🌸 Iris Flower Prediction</h1>
    <p>Enter flower measurements to predict the species</p><br>
    <p>{{ct}}</p>
    <br>

    <form action="/predict" method="post">
      <input type="number" step="any" name="sl" placeholder="Sepal Length" required>
      <input type="number" step="any" name="sw" placeholder="Sepal Width" required>
      <input type="number" step="any" name="pl" placeholder="Petal Length" required>
      <input type="number" step="any" name="pw" placeholder="Petal Width" required>
      <button type="submit">Predict</button>
    </form>

    {% if pred %}
      <div class="prediction-box">
        <div class="prediction-text">
          🌼 Prediction: <span>{{ pred }}</span>
        </div>

        <div class="pred-img">
          <img 
            src="/static/images/{{ pred | lower }}.jpg" 
            alt="Predicted class: {{ pred }}"
            loading="lazy"
          >
        </div>
      </div>
    {% endif %}

    <a class="back-link" href="/">← Back to Home</a> <br>
    <a class="back-link" href="/about">About Me</a>
  </div>

</body>
</html>
